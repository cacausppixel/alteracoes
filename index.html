<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterações - Comentários do Professor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            transition: all 0.3s ease;
        }
        .card {
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .badge-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-completed { background: #dcfce7; color: #166534; }
        .badge-in-progress { background: #dbeafe; color: #0c4a6e; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white shadow sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">📝 Alterações</h1>
                <p class="text-sm text-gray-500">Comentários e feedback do professor</p>
            </div>
            <button onclick="toggleTheme()" class="bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded-lg text-sm font-semibold">
                🌙 Tema
            </button>
        </div>
    </header>

    <div class="max-w-6xl mx-auto px-6 py-8">
        <!-- Filters -->
        <div class="mb-8 flex flex-wrap gap-3">
            <button onclick="filterComments('all')" class="filter-btn active bg-blue-500 text-white px-4 py-2 rounded-lg font-semibold">
                Todas
            </button>
            <button onclick="filterComments('pending')" class="filter-btn bg-white border border-gray-200 px-4 py-2 rounded-lg font-semibold hover:border-blue-500">
                ⏳ Pendentes
            </button>
            <button onclick="filterComments('in-progress')" class="filter-btn bg-white border border-gray-200 px-4 py-2 rounded-lg font-semibold hover:border-blue-500">
                ⚙️ Em Progresso
            </button>
            <button onclick="filterComments('completed')" class="filter-btn bg-white border border-gray-200 px-4 py-2 rounded-lg font-semibold hover:border-blue-500">
                ✅ Concluído
            </button>
        </div>

        <!-- Add New Comment -->
        <div class="bg-white rounded-lg shadow p-6 mb-8">
            <h2 class="text-lg font-bold text-gray-800 mb-4">➕ Adicionar Comentário</h2>
            <form onsubmit="addComment(event)" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input 
                        type="text" 
                        id="title" 
                        placeholder="Título do comentário" 
                        class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500"
                        required
                    >
                    <select 
                        id="status" 
                        class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500"
                    >
                        <option value="pending">⏳ Pendente</option>
                        <option value="in-progress">⚙️ Em Progresso</option>
                        <option value="completed">✅ Concluído</option>
                    </select>
                </div>
                <textarea 
                    id="description" 
                    placeholder="Descrição detalhada..." 
                    rows="4"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500"
                    required
                ></textarea>
                <button 
                    type="submit" 
                    class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold"
                >
                    Adicionar
                </button>
            </form>
        </div>

        <!-- Comments List -->
        <div id="commentsList" class="space-y-4">
            <p class="text-gray-500 text-center py-8">Nenhum comentário ainda. Adicione um para começar!</p>
        </div>
    </div>

    <script>
        // Data storage
        let comments = JSON.parse(localStorage.getItem('comments')) || [];
        let currentFilter = 'all';

        // Add comment
        function addComment(event) {
            event.preventDefault();

            const comment = {
                id: Date.now(),
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                status: document.getElementById('status').value,
                date: new Date().toLocaleDateString('pt-BR')
            };

            comments.unshift(comment);
            saveComments();
            renderComments();

            // Reset form
            event.target.reset();
        }

        // Filter comments
        function filterComments(filter) {
            currentFilter = filter;
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-blue-500', 'text-white');
                btn.classList.add('bg-white', 'border', 'border-gray-200');
            });
            event.target.classList.add('bg-blue-500', 'text-white');
            event.target.classList.remove('bg-white', 'border', 'border-gray-200');

            renderComments();
        }

        // Render comments
        function renderComments() {
            const listEl = document.getElementById('commentsList');
            
            let filtered = comments;
            if (currentFilter !== 'all') {
                filtered = comments.filter(c => c.status === currentFilter);
            }

            if (filtered.length === 0) {
                listEl.innerHTML = '<p class="text-gray-500 text-center py-8">Nenhum comentário encontrado.</p>';
                return;
            }

            listEl.innerHTML = filtered.map(comment => `
                <div class="card bg-white rounded-lg shadow p-6 border-l-4 border-blue-500">
                    <div class="flex justify-between items-start mb-3">
                        <h3 class="text-lg font-bold text-gray-800">${comment.title}</h3>
                        <div class="flex gap-2">
                            <span class="badge-status badge-${comment.status}">
                                ${getStatusLabel(comment.status)}
                            </span>
                            <button onclick="deleteComment(${comment.id})" class="text-red-500 hover:text-red-700 text-sm font-semibold">
                                🗑️
                            </button>
                        </div>
                    </div>
                    <p class="text-gray-700 mb-3">${comment.description}</p>
                    <div class="flex justify-between items-center text-sm text-gray-500">
                        <span>📅 ${comment.date}</span>
                        <button onclick="toggleStatus(${comment.id})" class="text-blue-500 hover:text-blue-700 font-semibold">
                            Próximo Status →
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Get status label
        function getStatusLabel(status) {
            const labels = {
                'pending': '⏳ Pendente',
                'in-progress': '⚙️ Em Progresso',
                'completed': '✅ Concluído'
            };
            return labels[status] || status;
        }

        // Toggle status
        function toggleStatus(id) {
            const comment = comments.find(c => c.id === id);
            const statuses = ['pending', 'in-progress', 'completed'];
            const currentIndex = statuses.indexOf(comment.status);
            const nextIndex = (currentIndex + 1) % statuses.length;
            comment.status = statuses[nextIndex];
            saveComments();
            renderComments();
        }

        // Delete comment
        function deleteComment(id) {
            if (confirm('Tem certeza que deseja deletar este comentário?')) {
                comments = comments.filter(c => c.id !== id);
                saveComments();
                renderComments();
            }
        }

        // Save to localStorage
        function saveComments() {
            localStorage.setItem('comments', JSON.stringify(comments));
        }

        // Toggle theme
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }

        // Initial render
        renderComments();
    </script>
</body>
</html>
